{{ define "main" }}
  <h1 class="wf-h1">{{ .Title }}</h1>
  <div class="wf-prose">
    {{ .Content }}
  </div>

  <div class="wf-card-grid">
    <a href="{{ "/bio/" | relURL }}" class="wf-card">
      <div class="wf-card-title">/bio</div>
      <p class="wf-caption">who i am, what i work on.</p>
    </a>
    <a href="{{ "/posts/" | relURL }}" class="wf-card">
      <div class="wf-card-title">/posts</div>
      <p class="wf-caption">writing about software, systems, and side projects.</p>
    </a>
  </div>
{{ end }}
